<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خطة العشرين يوماً في الكيمياء - التحصيلي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#070b14;--bg2:#0f1628;--card:#151d30;--card-hover:#1a2540;--cyan:#00e5ff;--green:#00e676;--orange:#ff9100;--pink:#ff4081;--purple:#b388ff;--yellow:#ffd600;--red:#ff5252;--txt:#e0e6f0;--txt2:#7b8da6;--txt3:#4a5a70;--border:rgba(255,255,255,0.06)}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 0%,rgba(0,229,255,.04),transparent 60%),radial-gradient(ellipse at 70% 100%,rgba(179,136,255,.03),transparent 60%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--txt3);border-radius:3px}
.hero{position:relative;z-index:1;text-align:center;padding:50px 20px 30px}
.hero::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.2}
.badge{display:inline-block;padding:5px 18px;background:linear-gradient(135deg,rgba(0,229,255,.08),rgba(179,136,255,.08));border:1px solid rgba(0,229,255,.15);border-radius:50px;font-size:12px;color:var(--cyan);letter-spacing:3px;margin-bottom:16px}
.hero h1{font-family:'Cairo',sans-serif;font-size:clamp(1.8rem,5vw,3.2rem);font-weight:900;background:linear-gradient(135deg,#fff,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.4;margin-bottom:10px}
.hero p{font-size:15px;color:var(--txt2);max-width:500px;margin:0 auto;line-height:1.8}
.stats{position:relative;z-index:1;display:flex;justify-content:center;gap:30px;padding:20px;flex-wrap:wrap}
.stat{text-align:center}.stat-num{font-family:'Cairo',sans-serif;font-size:28px;font-weight:900;color:var(--cyan)}.stat-label{font-size:12px;color:var(--txt3);margin-top:2px}
.progress-wrap{position:relative;z-index:1;max-width:850px;margin:10px auto 30px;padding:0 20px}
.progress-box{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:14px;padding:16px 20px;backdrop-filter:blur(10px)}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.progress-top span{font-size:13px;color:var(--txt2)}.progress-top b{font-family:'Cairo',sans-serif;font-size:20px;color:var(--cyan)}
.progress-track{height:6px;background:rgba(255,255,255,.04);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--cyan),var(--purple));border-radius:10px;transition:width .8s ease}
.grid{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 20px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.day-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 20px;cursor:pointer;transition:all .3s ease;position:relative;overflow:hidden}
.day-card:hover{background:var(--card-hover);border-color:rgba(0,229,255,.15);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.day-card::before{content:'';position:absolute;top:0;right:0;left:0;height:3px;background:linear-gradient(90deg,var(--cyan),var(--purple));opacity:0;transition:opacity .3s}
.day-card:hover::before{opacity:1}
.day-num{font-family:'Cairo',sans-serif;font-size:36px;font-weight:900;opacity:.08;position:absolute;top:10px;left:16px}
.day-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:14px}
.day-title{font-family:'Cairo',sans-serif;font-weight:700;font-size:16px;margin-bottom:4px}
.day-desc{font-size:12px;color:var(--txt3);margin-bottom:14px;line-height:1.6}
.day-meta{display:flex;justify-content:space-between;align-items:center}
.day-count{font-size:11px;color:var(--txt2);background:rgba(255,255,255,.04);padding:3px 10px;border-radius:20px}
.day-status{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700}
.status-new{color:var(--cyan);background:rgba(0,229,255,.08)}
.status-done{color:var(--green);background:rgba(0,230,118,.08)}
.status-progress{color:var(--orange);background:rgba(255,145,0,.08)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;backdrop-filter:blur(6px);overflow-y:auto}
.overlay.active{display:block}
.quiz-container{max-width:800px;margin:30px auto;padding:20px;animation:slideUp .4s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.quiz-header{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;position:relative}
.quiz-close{position:absolute;top:16px;left:16px;width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--txt2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.quiz-close:hover{background:rgba(255,82,82,.1);color:var(--red);border-color:rgba(255,82,82,.2)}
.quiz-day-title{font-family:'Cairo',sans-serif;font-size:22px;font-weight:700;margin-bottom:4px}
.quiz-day-topic{font-size:13px;color:var(--txt2);margin-bottom:12px}
.subtopics-list{margin-bottom:16px;display:flex;flex-wrap:wrap;gap:6px}
.subtopic-tag{font-size:11px;padding:4px 10px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--txt2);line-height:1.4}
.subtopic-tag b{color:var(--cyan);margin-right:4px}
.quiz-progress{display:flex;gap:2px;margin-bottom:12px;flex-wrap:wrap}
.quiz-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.06);transition:background .3s;flex-shrink:0}
.quiz-dot.correct{background:var(--green)}.quiz-dot.wrong{background:var(--red)}
.quiz-info{display:flex;gap:16px;font-size:12px;color:var(--txt3)}.quiz-info span{display:flex;align-items:center;gap:4px}
.timer-box{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;font-family:'Cairo',sans-serif;font-size:14px;color:var(--txt2)}
.timer-box .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;transition:border-color .3s}
.q-card.correct-card{border-color:rgba(0,230,118,.2)}.q-card.wrong-card{border-color:rgba(255,82,82,.2)}
.q-number{font-size:11px;color:var(--txt3);margin-bottom:8px;font-weight:700;letter-spacing:1px}
.q-text{font-size:15px;font-weight:500;line-height:1.9;margin-bottom:16px}
.q-options{display:flex;flex-direction:column;gap:8px}
.q-option{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;font-size:14px;line-height:1.7}
.q-option:hover:not(.disabled){background:rgba(0,229,255,.04);border-color:rgba(0,229,255,.15)}
.q-option .letter{min-width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--txt2);flex-shrink:0}
.q-option.is-correct{background:rgba(0,230,118,.06);border-color:rgba(0,230,118,.3)}.q-option.is-correct .letter{background:var(--green);color:var(--bg)}
.q-option.is-wrong{background:rgba(255,82,82,.06);border-color:rgba(255,82,82,.3)}.q-option.is-wrong .letter{background:var(--red);color:#fff}
.q-option.disabled{cursor:default;opacity:.7}.q-option.disabled.dim{opacity:.4}
.q-explanation{display:none;margin-top:12px;padding:12px 16px;background:rgba(0,230,118,.04);border:1px solid rgba(0,230,118,.1);border-radius:10px;font-size:13px;color:var(--green);line-height:1.8}
.q-explanation.show{display:block}
.quiz-footer{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-top:20px}
.quiz-score{font-family:'Cairo',sans-serif}.quiz-score b{font-size:24px;color:var(--cyan)}.quiz-score span{font-size:13px;color:var(--txt3);margin-right:6px}
.btn{padding:10px 24px;border-radius:10px;border:none;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--cyan),#0091ea);color:var(--bg);box-shadow:0 4px 15px rgba(0,229,255,.2)}.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,229,255,.3)}
.btn-reset{background:rgba(255,82,82,.08);border:1px solid rgba(255,82,82,.15);color:var(--red)}.btn-reset:hover{background:rgba(255,82,82,.15)}
.results-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;backdrop-filter:blur(10px);align-items:center;justify-content:center}
.results-overlay.active{display:flex}
.results-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;text-align:center;max-width:420px;width:90%;animation:slideUp .5s ease}
.results-icon{font-size:60px;margin-bottom:16px}.results-title{font-family:'Cairo',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px;line-height:1.6}
.results-score{font-family:'Cairo',sans-serif;font-size:48px;font-weight:900;color:var(--cyan);margin:16px 0}
.results-detail{font-size:14px;color:var(--txt2);line-height:1.8;margin-bottom:24px}
.results-bar{height:8px;background:rgba(255,255,255,.05);border-radius:4px;margin:16px 0 24px;overflow:hidden}
.results-bar-fill{height:100%;border-radius:4px;transition:width 1s ease}
@media(max-width:600px){.hero{padding:30px 16px 20px}.hero h1{font-size:1.6rem}.grid{grid-template-columns:1fr;padding:0 16px 40px}.stats{gap:16px}.stat-num{font-size:22px}.quiz-container{padding:12px}.q-card{padding:16px}.subtopics-list{gap:4px}.subtopic-tag{font-size:10px;padding:3px 8px}}
</style>
</head>
<body>
<div class="hero">
  <div class="badge">الاختبار التحصيلي</div>
  <h1>🧪 خطة العشرين يوماً في الكيمياء</h1>
  <p>٥٢٨ سؤال اختيار من متعدد — ٨ أقسام — ٢٠ اختبار يومي<br>راجع الكيمياء وتابع تقدمك يوماً بيوم</p>
  <div style="margin-top:16px;font-size:13px;color:var(--cyan);opacity:.85;font-weight:500">تصميم وإعداد الأستاذ / أحمد السيد علي</div>
</div>
<div class="stats">
  <div class="stat"><div class="stat-num" id="totalQ">528</div><div class="stat-label">سؤال</div></div>
  <div class="stat"><div class="stat-num" id="totalDone">0 / 20</div><div class="stat-label">مكتمل</div></div>
  <div class="stat"><div class="stat-num" id="totalCorrect">0</div><div class="stat-label">إجابة صحيحة</div></div>
  <div class="stat"><div class="stat-num" id="totalAvg">0%</div><div class="stat-label">المعدل العام</div></div>
</div>
<div class="progress-wrap"><div class="progress-box"><div class="progress-top"><span>التقدم الكلي</span><b id="progressPct">0%</b></div><div class="progress-track"><div class="progress-fill" id="progressFill"></div></div></div></div>
<div class="grid" id="dayGrid"></div>
<div class="overlay" id="quizOverlay"><div class="quiz-container" id="quizContainer"></div></div>
<div class="results-overlay" id="resultsOverlay"><div class="results-box" id="resultsBox"></div></div>
<script>
const DAYS_DATA = [
  {
    title: "اليوم الأول",
    topic: "القسم الأول: مقدمة في علم الكيمياء",
    icon: "🧪",
    color: "#00e5ff",
    subtopics: [
      {name:"طبقة الأوزون", count:9},
      {name:"المادة وحالاتها", count:8},
      {name:"الخواص الفيزيائية والكيميائية", count:8},
      {name:"التغيرات الفيزيائية والكيميائية", count:10},
      {name:"العنصر والمركب", count:7},
      {name:"التفاعل الكيميائي وأنواعه", count:8},
      {name:"وزن المعادلات والحسابات الكيميائية", count:7}
    ],
    questions: [
      {q:"فرع الكيمياء الذي يقوم بدراسة أنواع المواد ومكوناتها:", options:["الكيمياء الذرية", "الكيمياء الحيوية", "الكيمياء العضوية", "الكيمياء التحليلية"], answer:3, explanation:"الكيمياء التحليلية"},
      {q:"علم يقوم بدراسة نظريات تركيب المادة:", options:["الكيمياء التحليلية", "الكيمياء الذرية", "الكيمياء الفيزيائية", "الكيمياء النووية"], answer:1, explanation:"كيمياء الذرة تدرس"},
      {q:"فرع الكيمياء الذي يستقصي تحلل مواد التغليف في البيئة:", options:["الكيمياء الحيوية", "الكيمياء البيئية", "الكيمياء الصناعية", "الكيمياء الفيزيائية"], answer:1, explanation:"الكيمياء البيئية تهتم"},
      {q:"الأشعة التي يمتص معظمها غاز الأوزون:", options:["تحت الحمراء", "فوق البنفسجية", "السينية", "جاما"], answer:1, explanation:"طبقة الأوزون تمتص"},
      {q:"غاز الأوزون O₃ يوجد في طبقة تُسمى:", options:["الستراتوسفير", "التروبوسفير", "الميزوسفير", "الثيرموسفير"], answer:0, explanation:"يتكون غاز الأوزون في"},
      {q:"ما عدد جزيئات الأوزون الناتجة عن 18 ذرة أكسجين؟", options:["2", "3", "6", "9"], answer:2, explanation:"O₃ = 3 ذرات. 18 ÷ 3 ="},
      {q:"أي المواد التالية يسبب تناقصاً في طبقة الأوزون؟", options:["أكاسيد الكبريت", "الكلوروفلوروكربون", "الأكسجين", "ثاني أكسيد الكربون"], answer:1, explanation:"مركبات CFCs هي المسبب"},
      {q:"تمكن من قياس كمية الأوزون:", options:["رذرفورد", "كروكس", "دوبسون", "مليكان"], answer:2, explanation:"الباحث دوبسون قاس كمية"},
      {q:"المعدل الطبيعي لكمية الأوزون يعادل:", options:["150 DU", "300 DU", "400 DU", "600 DU"], answer:1, explanation:"المستوى الطبيعي = 300"},
      {q:"أي التالي ليس من قواعد السلامة في المختبر؟", options:["المعطف", "القفازات", "لبس نظارات الأمان", "لبس العدسات اللاصقة"], answer:3, explanation:"العدسات اللاصقة ليست"},
      {q:"دراسة مركبات CFCs وتفاعلاتها مع الأوزون بدون دليل بيّن:", options:["البحث النظري", "البحث العملي", "البحث التجريبي", "البحث التطبيقي"], answer:0, explanation:"البحث النظري يهدف"},
      {q:"بحث يُجرى لحل مشكلة محددة:", options:["البحث النظري", "البحث الفلسفي", "البحث الوصفي", "البحث التطبيقي"], answer:3, explanation:"البحث التطبيقي لحل"},
      {q:"كل ما له كتلة ويشغل حيزاً من الفراغ:", options:["الحرارة", "الضوء", "المادة", "الصوت"], answer:2, explanation:"تعريف المادة: كل ما"},
      {q:"أي التالي يُعد مادة؟", options:["الضوء", "الحرارة", "الصوت", "الهواء"], answer:3, explanation:"الهواء مادة لأن له"},
      {q:"أي التالي لا يُصنَّف مادة؟", options:["الماء", "الهواء", "الحرارة", "التراب"], answer:2, explanation:"الحرارة طاقة وليست"},
      {q:"مقياس لكمية المادة فقط:", options:["الحجم", "الكتلة", "الكثافة", "الوزن"], answer:1, explanation:"الكتلة مقياس كمية"},
      {q:"أي العبارات يصف مادة في الحالة الصلبة؟", options:["لها صفة الجريان", "يمكن ضغطها", "تأخذ شكل الوعاء", "جسيماتها متلاصقة بقوة"], answer:3, explanation:"الصلبة: جسيمات"},
      {q:"أي حالات المادة شكلها وحجمها ثابتان؟", options:["الصلبة", "السائلة", "الغازية", "البلازما"], answer:0, explanation:"الصلبة فقط لها شكل"},
      {q:"الحالة الفيزيائية للزئبق في الطبيعة:", options:["بلازما", "سائل", "غاز", "صلب"], answer:1, explanation:"الزئبق سائل عند درجة"},
      {q:"حالة المادة التي شكلها وحجمها غير ثابتين وجسيماتها متباعدة:", options:["البلازما", "الغازية", "الصلبة", "السائلة"], answer:1, explanation:"الحالة الغازية شكلها"},
      {q:"أي الخواص التالية خاصية فيزيائية؟", options:["تكوّن صدأ الحديد", "احتراق قطعة خشب", "فقد الفضة بريقها", "توصيل النحاس للكهرباء"], answer:3, explanation:"التوصيل الكهربائي"},
      {q:"أي التالي من الخواص النوعية (المميزة)؟", options:["الحجم", "السرعة", "الطول", "اللون"], answer:3, explanation:"اللون خاصية نوعية لا **◼ وزن المعادلات والحسابات"},
      {q:"تُمثّل رائحة العطر:", options:["خاصية كمية", "خاصية فيزيائية", "تغيراً كيميائياً", "تغيراً فيزيائياً"], answer:1, explanation:"الرائحة خاصية"},
      {q:"أي التالي يُمثّل خاصية كمية؟", options:["يذوب الملح في الماء", "تركيز المحلول 1 mol/L", "الصوديوم كاوي للجلد", "السحب تحوي أمطاراً"], answer:1, explanation:"التركيز خاصية كمية"},
      {q:"الصفة الكمية لورقة الإجابة بين يديك:", options:["لونها", "مقاسها", "رائحتها", "ملمسها"], answer:1, explanation:"المقاس صفة كمية"},
      {q:"أيّ التالي خاصية كيميائية؟", options:["صدأ الحديد بالهواء الرطب", "غليان الماء عند 100°C", "انصهار الزبدة", "ذوبان الملح"], answer:0, explanation:"الصدأ خاصية كيميائية"},
      {q:"أي التالي خاصية كيميائية؟", options:["الماء عديم اللون", "تحلل السكر إلى كربون وبخار ماء", "ملح الطعام بلوري صلب", "أول أكسيد الكربون يتصاعد"], answer:1, explanation:"تحلل السكر ينتج مواد"},
      {q:"أي خواص ملح الطعام التالية خاصية كيميائية؟", options:["طعمه مالح", "لونه أبيض", "شكله بلوري", "لا يتفاعل مع الماء النقي"], answer:3, explanation:"عدم التفاعل خاصية"},
      {q:"التغيّر الذي يحدث دون فقد الخواص الأصلية:", options:["الفيزيائي", "الكيميائي", "الحيوي", "البيولوجي"], answer:0, explanation:"التغير الفيزيائي لا"},
      {q:"أيّ التالي تغير فيزيائي؟", options:["هضم الطعام", "صدأ الفولاذ", "كسر الزجاج", "حرق الخشب"], answer:2, explanation:"كسر الزجاج لا يغير"},

  h+=`</div><div class="quiz-info"><span><div class="timer-box"><span class="dot"></span><span id="quizTimer">00:00</span></div></span><span>الإجابات: ${ans} / ${tQ}</span></div></div>`;
  day.questions.forEach((q,qi)=>{
    const ua=ds.answers[qi];const ia=ua!==undefined;const ic=ia&&ua===q.answer;let cc='';if(ia)cc=ic?'correct-card':'wrong-card';
    h+=`<div class="q-card ${cc}" id="qcard-${qi}"><div class="q-number">السؤال ${qi+1} من ${tQ}</div><div class="q-text">${q.q}</div><div class="q-options">`;
    q.options.forEach((o,oi)=>{let oc='';if(ia){oc='disabled ';if(oi===q.answer)oc+='is-correct';else if(oi===ua)oc+='is-wrong';else oc+='dim'}
      h+=`<div class="q-option ${oc}" ${!ia?`onclick="sel(${qi},${oi})"`:''}><span class="letter">${letters[oi]}</span><span>${o}</span></div>`});
    h+=`</div>`;if(q.explanation)h+=`<div class="q-explanation ${ia?'show':''}" id="expl-${qi}">💡 ${q.explanation}</div>`;h+=`</div>`});
  const cc=Object.entries(ds.answers).filter(([qi,a])=>a===day.questions[qi].answer).length;
  h+=`<div class="quiz-footer"><div class="quiz-score"><b>${cc}</b><span>/ ${tQ} صحيحة</span></div><div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-reset" onclick="resetDay(${di})">إعادة</button>
    ${ans===tQ&&!ds.completed?`<button class="btn btn-primary" onclick="finishDay(${di})">إنهاء الاختبار</button>`:''}
    ${ds.completed?'<span style="color:var(--green);font-weight:700;padding:10px">✓ مكتمل</span>':''}</div></div>`;
  document.getElementById('quizContainer').innerHTML=h;document.getElementById('quizOverlay').classList.add('active');document.body.style.overflow='hidden';document.getElementById('quizOverlay').scrollTop=0}
function sel(qi,oi){const ds=getDayState(currentDay);if(ds.answers[qi]!==undefined)return;ds.answers[qi]=oi;saveState();openQuiz(currentDay);setTimeout(()=>{const el=document.getElementById('qcard-'+qi);if(el)el.scrollIntoView({behavior:'smooth',block:'center'})},100)}
function closeQuiz(){if(timerInterval)clearInterval(timerInterval);document.getElementById('quizOverlay').classList.remove('active');document.body.style.overflow='';renderGrid()}
function resetDay(di){if(!confirm('هل تريد إعادة جميع الأسئلة لهذا اليوم؟'))return;state[di]={answers:{},completed:false};saveState();openQuiz(di)}
function finishDay(di){
  const day=DAYS_DATA[di];const ds=getDayState(di);ds.completed=true;saveState();
  const tQ=day.questions.length;const c=Object.entries(ds.answers).filter(([qi,a])=>a===day.questions[qi].answer).length;const p=Math.round(c/tQ*100);
  let icon='🎉',msg='أداء رائع! استمر بهذا المستوى',bc='var(--green)';
  if(p<50){icon='💪';msg='تحتاج مراجعة أكثر، لا تستسلم!';bc='var(--red)'}else if(p<75){icon='📈';msg='أداء جيد، واصل التحسن!';bc='var(--orange)'}
  document.getElementById('resultsBox').innerHTML=`<div class="results-icon">${icon}</div><div class="results-title">${day.title}<br>${day.topic}</div><div class="results-score">${p}%</div><div class="results-bar"><div class="results-bar-fill" style="width:${p}%;background:${bc}"></div></div><div class="results-detail">${c} إجابة صحيحة من ${tQ} سؤال<br>${msg}</div><button class="btn btn-primary" onclick="closeResults()">حسناً</button>`;
  document.getElementById('resultsOverlay').classList.add('active')}
function closeResults(){document.getElementById('resultsOverlay').classList.remove('active');openQuiz(currentDay)}
loadState();renderGrid();
</script></body></html>
